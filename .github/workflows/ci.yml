name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**", "release/**"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify build artifacts
        run: |
          test -f main.js || (echo "main.js missing" && exit 1)
          test -f manifest.json || (echo "manifest.json missing" && exit 1)
          test -f styles.css || (echo "styles.css missing" && exit 1)
          ls -lh main.js manifest.json styles.css

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-build
          path: |
            main.js
            manifest.json
            styles.css
          retention-days: 7
